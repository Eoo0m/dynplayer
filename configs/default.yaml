# Common configuration for all experiments

# Data paths
data:
  csv_dir: "data/csvs"
  datasets:
    min2_win10:
      csv_file: "track_playlist_counts_min2_win10.csv"
      description: "Minimum 2 occurrences, 10-track window"
    min5_win10:
      csv_file: "track_playlist_counts_min5_win10.csv"
      description: "Minimum 5 occurrences, 10-track window"

# Common training settings
training:
  seed: 42
  split_ratio: 0.8  # 80% train, 20% test
  embedding_dim: 64
  epochs: 20
  eval_every: 5
  k_values: [10, 20]

# LightGCN (sparse, random split) specific settings
lightgcn:
  output_dir: "lightgcn_sparse/outputs"
  n_layers: 3
  batch_size: 1024
  lr: 0.001
  samples_per_user: 1
  reg_weight: 1e-4
  dropout: false
  keep_prob: 0.8

# LightGCN LOO specific settings
lightgcn_loo:
  output_dir: "lightgcn_loo/outputs"
  n_layers: 3
  batch_size: 1024
  lr: 0.001
  samples_per_user: 1
  reg_weight: 1e-4
  dropout: false
  keep_prob: 0.8

# Contrastive Learning LOO specific settings (basic, no uniformity loss)
contrastive:
  output_dir: "contrastive_learning_loo/outputs"
  batch_size: 1024
  lr: 0.001
  tau: 0.07
  uniformity_weight: 0.0  # Basic version (no uniformity loss)

# Contrastive Learning LOO with Uniformity Loss
contrastive_uni:
  output_dir: "contrastive_learning_loo_uni/outputs"
  batch_size: 1024
  lr: 0.001
  tau: 0.07
  uniformity_weight: 1.0  # With uniformity loss

# SimGCL LOO specific settings
simgcl:
  output_dir: "simgcl_loo/outputs"
  n_layers: 3
  batch_size: 1024
  lr: 0.001
  samples_per_user: 7
  noise_eps: 0.1
  lambda_cl: 0.1
  tau: 0.2
  reg_weight: 1e-4
